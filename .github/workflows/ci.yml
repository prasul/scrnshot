name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Verifies go.sum against the module cache without mutating any files.
      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      # Full build INCLUDING sftp (the runner has the network access the
      # local sandbox lacked, so golang.org/x/crypto resolves here).
      - name: Build
        run: go build ./...

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Validate the .goreleaser.yaml schema and dry-run the full build,
      # including fusing the macOS universal binary. No release is published.
      - name: GoReleaser check + snapshot build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
