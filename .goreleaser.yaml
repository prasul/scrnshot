# GoReleaser configuration for scrnshot.
# Produces a macOS universal binary (Intel + Apple Silicon fused with lipo)
# plus per-arch archives. Run a release with: goreleaser release --clean
#
# Note: the build runs on a real toolchain with network access, so SFTP
# support (golang.org/x/crypto) is included by default — no build tags needed.
version: 2

project_name: scrnshot

before:
  hooks:
    - go mod tidy

builds:
  - id: scrnshot
    main: .
    binary: scrnshot
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

# Fuse the two darwin builds into a single universal binary.
universal_binaries:
  - id: scrnshot-universal
    ids:
      - scrnshot
    name_template: scrnshot
    replace: true

archives:
  - id: default
    ids:
      - scrnshot-universal
    name_template: "{{ .ProjectName }}_{{ .Version }}_macos_universal"
    formats: [tar.gz]
    files:
      - README.md
      - config.example.json

checksum:
  name_template: "checksums.txt"

# Optional: publish a Homebrew formula to your own tap so users can
# `brew install prasul/tap/scrnshot`. Fill in the tap repo to enable.
# brews:
#   - repository:
#       owner: prasul
#       name: homebrew-tap
#     homepage: "https://github.com/prasul/scrnshot"
#     description: "ShareX-style capture/optimize/upload tool for macOS"
#     dependencies:
#       - name: imagemagick
#         type: optional

release:
  github:
    owner: prasul
    name: scrnshot
  draft: true
